<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="JustHex" content="width=device-width, initial-scale=1.0" />
    <title></title>
    <link rel="stylesheet" href="logic_and_style/index.css" />
  </head>

  <body>
    <div class="header">
      <ul>
        <li>JustHex</li>
      </ul>

      <ul class="header_menu">
        <div class="header_file">
          <button class="Headerbtn">File</button>
          <div class="header_content">
            <input type="file" multiple id="openButton" class="open_button" />
          </div>
        </div>
        <div class="header_edit">
          <button class="Headerbtn">Edit</button>
          <div class="header_content">
            <form id="searchForm">
              <fieldset id="searchFormFieldset">
                <legend>Choose file</legend>
              </fieldset>
              <ul>
                <li>
                  <label for="searchForm_hex_string">Hex String</label>
                  <input id ="searchForm_hex_string" type="text">
                </li>
              </ul>
              <button type="submit">Search</button>
            </form>
          </div>
        </div>
        <div class="header_view">
          <button class="Headerbtn">View</button>
          <div class="header_content">
            <form id="settingsForm">
              <ul>
                <li>
                  <label for="rowSize">Row size:</label>
                  <input id ="rowSize" type="number">
                </li>
                <li>
                  <label for="byteGroupSize">Byte Group size:</label>
                  <input id ="byteGroupSize" type="number">
                </li>
              </ul>
              <button type="submit">Save settings</button>
            </form>
          </div>
        </div>
      </ul>
    </div>

    <div class="wrapper">
      <ul id="opened_files_list">

      </ul>
    </div>

    <div class="footer"></div>
    <script src="logic_and_style/index.js"></script>
  </body>
</html>
